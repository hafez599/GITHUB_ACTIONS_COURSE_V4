name: 08 Final Assessment CI

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - opened
      - synchronize    

env:
  PR_SCAN_IMAGE: tiny-health-app:pr-scan

jobs:
  verify:
    name: CI quality gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]
        version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run Ruff linting
        uses: astral-sh/ruff-action@v3
        with:
          args: "check . --output-format=github"

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy Dockerfile and config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.PR_SCAN_IMAGE }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.PR_SCAN_IMAGE }}'
          format: 'json'
          output: 'trivy-image-report.json'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7
