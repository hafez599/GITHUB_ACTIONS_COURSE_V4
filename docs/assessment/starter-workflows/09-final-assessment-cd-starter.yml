name: 09 Final Assessment CD

on:
  workflow_run:
    workflows: ["08 Final Assessment CI"]
    types: [completed]

env:
  IMAGE_NAME: tiny-health-app
  APP_PORT: "8000"

jobs:
  build-and-push:
    name: Build and push release image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      image_tag: "${{ steps.image-tag.outputs.value }}"
      image_ref: "${{ steps.image-ref.outputs.value }}"

    steps:
      - name: Check required GitHub secrets
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          missing=0
          for secret in ECR_REGISTRY ECR_REPOSITORY AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION EC2_HOST EC2_USER EC2_SSH_KEY; do
            if [[ -z "${!secret}" ]]; then
              echo "Missing secret: ${secret}"
              missing=1
            fi
          done
          if [[ "${missing}" -eq 1 ]]; then
            echo "One or more required secrets are missing."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create image tag
        id: image-tag
        run: |
          TAG="$(date -u +'%Y%m%d')-${{ github.run_id }}"
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create full image reference
        id: image-ref
        run: |
          IMAGE_REFERENCE="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.value }}"
          echo "value=${IMAGE_REFERENCE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Show image reference
        run: echo "Building and pushing ${{ steps.image-ref.outputs.value }}"

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image-ref.outputs.value }}

  deploy-to-host:
    name: Deploy to remote host
    needs:
      - build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy image over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_REF,IMAGE_TAG,APP_PORT,COMMIT_SHA,AWS_REGION,ECR_REGISTRY
          script: |
            # Step 1 — confirm Docker exists on remote host
            if ! command -v docker &>/dev/null; then
              echo "Docker is not installed on the remote host."
              exit 1
            fi
            echo "Docker is available: $(docker --version)"

            # Step 2 — log in to ECR from EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Step 3 — pull the exact image
            docker pull ${{ needs.build-and-push.outputs.image_ref }}

            # Step 4 — remove old container safely
            docker rm -f tiny-health-container || true

            # Step 5 — run new container
            docker run -d \
              --name tiny-health-container \
              --restart unless-stopped \
              -p ${{ env.APP_PORT }}:8000 \
              -e APP_ENV=production \
              -e APP_VERSION=${{ needs.build-and-push.outputs.image_tag }} \
              -e COMMIT_SHA=${{ github.sha }} \
              -e DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
              -e IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }} \
              -e DEPLOY_MODE=ssh \
              ${{ needs.build-and-push.outputs.image_ref }}

            # Step 6 — wait for /health on the host
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent "http://127.0.0.1:${{ env.APP_PORT }}/health"; then
                echo "App is healthy!"
                break
              fi
              echo "Attempt ${attempt} failed, waiting..."
              sleep 3
            done

            # Step 7 — check /version and /status on the host
            curl --fail --silent "http://127.0.0.1:${{ env.APP_PORT }}/version"
            curl --fail --silent "http://127.0.0.1:${{ env.APP_PORT }}/status"

      - name: Validate deployed app from GitHub Actions
        run: |
          BASE_URL="http://${{ secrets.EC2_HOST }}:${{ env.APP_PORT }}"

          echo "Checking /health..."
          curl --fail --silent "${BASE_URL}/health"

          echo "Checking /version..."
          curl --fail --silent "${BASE_URL}/version"

          echo "Checking /status..."
          curl --fail --silent "${BASE_URL}/status"

          echo "All endpoints validated successfully."